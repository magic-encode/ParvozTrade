{% load static %}


<!-- breadcrumb-area start -->
<style>
    @media screen and (max-width:753px) {
        .send__message_button{
            font-size: 1rem !important;
        }
    }
</style>
<div class="breadcrumb-area">
    <div class="container">
        <div class="row align-items-center justify-content-center">
            <div class="col-12 text-center">
                <h2 class="breadcrumb-title">Biz bilan bog'lanish</h2>
                <!-- breadcrumb-list start -->
                <ul class="breadcrumb-list">
                    <li class="breadcrumb-item"><a href="index.html">Bosh sahifa</a></li>
                    /
                    <li class="breadcrumb-item active">Biz bilan bog'lanish</li>
                </ul>
                <!-- breadcrumb-list end -->
            </div>
        </div>
    </div>
</div>
<!-- breadcrumb-area end -->
<!-- Contact Area Start -->
<div class="contact-area">
    <div class="container">
        <div class="contact-wrapper">
            <div class="row">
                <div class="col-12">
                    <div class="contact-form">
                        <div class="contact-title mb-30">
                            <h2 class="title">Biz bilan bog'lanish</h2>
                        </div>
                        <form class="contact-form-style" action="{% url 'contact' %}" method="POST">
                            {% csrf_token %}
                            <div class="row">
                                {{form.as_p}}
                                <div class="col-lg-12 text-center">
                                    <button class="btn btn-primary send__message_button" type="submit" name="submit" value="Send message" style="font-size: 2rem;">Yuborish</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-12">
                    <div class="contact-info">
                        <div class="single-contact">
                            <div class="icon-box">
                                <img src="{% static 'assets/images/icons/contact-1.png' %}" alt="">
                            </div>
                            <div class="info-box">
                                <h5 class="title">Manzil</h5>
                                <p>Bizning Joylashuvimiz. <br>
                                </p>
                            </div>
                        </div>
                        <div class="single-contact">
                            <div class="icon-box">
                                <img src="{% static 'assets/images/icons/contact-2.png' %}" alt="">
                            </div>
                            <div class="info-box">
                                <h5 class="title">Telefon raqam</h5>
                                <p><a href="tel:0123456789">+998 345 67 89</a></p>
                                <p><a href="tel:0123456789">+998 345 67 89</a></p>
                            </div>
                        </div>
                        <div class="single-contact m-0">
                            <div class="icon-box">
                                <img src="{% static 'assets/images/icons/contact-3.png' %}" alt="">
                            </div>
                            <div class="info-box">
                                <h5 class="title">Email/Web</h5>
                                <p><a href="mailto:demo@example.com">parvoztrade@gmail.com</a></p>
                                <p><a href="https://www.example.com">www.parvoz-trade.uz</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Contact Area End -->
<!-- map Area Start -->
<div class="contact-map">
    <div id="mapid">
        <div class="mapouter">
            <div class="gmap_canvas">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3722.492993761128!2d71.85178754347774!3d40.90060298537127!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x439024698e718c38!2zNDDCsDU0JzAyLjIiTiA3McKwNTEnMTMuMSJF!5e1!3m2!1suz!2s!4v1661001484395!5m2!1suz!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                <a href="https://sites.google.com/view/maps-api-v2/mapv2"></a>
            </div>
        </div>
    </div>
</div>
<!-- map Area End -->
