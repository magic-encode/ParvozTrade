<!-- Hero/Intro Slider Start -->
<style>
    .shop_all_smart_devices_button{
        padding: 2.5% 0;
    }
    @media screen and (max-width:1152px) {
        .banner__slider__img img{
            margin: 100px 0 !important;
           
        }
    }
    /* @media screen and (max-width:500px) { */
        /* .banner__slider__img{ */

    @media screen and (max-width:405px) {

            width: 500px;
            /* display: none; */
        }
    }
    @media screen and (max-width:360px) {
        .banner__slider__img img{
            width: 500px !important;

        }
    }
    @media screen and (max-width:300px) {
        .banner__slider__img img{

    .reklam__modal{
        width: 100%;
        height: 100%;
        position: fixed !important;
        top: 15% !important;
        left: 17% !important;
        z-index: 999 !important;
        display: none;
    }
    .reklam__modal video , iframe {
        width: 70%;
        height: 70%;
    }
    @media screen and (max-width: 425px) {
        .reklam__modal video , iframe {
            width: 80%;
            height: 40%;
        }
        .reklam__modal{
            top: 20% !important;
            left: 12% !important;
        }
    } 
    .reklam__modal span{
        padding:3%;
        width: 40px;
        margin-top: 40px;
        margin-left: -10px;
        position: absolute;
        height: 40px;
        border-radius: 5px;
        font-size: large;
        font-weight: bold;
    }
</style>
<script>
    const myTimeout = setTimeout(myGreeting, 1000);
    
    function myGreeting() {
      document.querySelector(".reklam__modal").style.display  = "flex";
    }

    function closeReklamModal() {
        document.querySelector(".reklam__modal").style.display  = "none";
    }
</script>
